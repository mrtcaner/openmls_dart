[advisories]
# `cargo audit` scans every package retained in Cargo.lock, including optional
# packages that are not in the build graph. Removing the explicit
# openmls_libcrux_crypto dependency removed the X-Wing KEM/AEAD provider from
# the build, but Cargo keeps its optional packages in the lockfile. The AEAD,
# Ed25519, Poly1305, and AES-GCM entries below are therefore lockfile-only;
# `make rust-tree ARGS="-i <crate>"` reports no active path to them.
#
# libcrux-sha3 and its support crates (including libcrux-secrets) remain in the
# graph through hpke-rs itself. Their affected SHAKE and constant-time
# swap/select paths serve X-Wing, which this fork no longer exposes; the three
# supported RFC 9420 ciphersuites use the RustCrypto HPKE algorithms. Revisit
# these exceptions when the pinned hpke-rs/OpenMLS version changes.
ignore = [
    "RUSTSEC-2026-0124", # lockfile-only: libcrux-chacha20poly1305
    "RUSTSEC-2026-0075", # lockfile-only: libcrux-ed25519
    "RUSTSEC-2026-0073", # lockfile-only: libcrux-poly1305
    "RUSTSEC-2026-0207", # unreachable SHAKE API in active libcrux-sha3 crate
    "RUSTSEC-2026-0208", # unreachable X-Wing SHAKE path in active libcrux-sha3 crate
    "RUSTSEC-2026-0209", # lockfile-only: libcrux-aesgcm
    "RUSTSEC-2026-0211", # lockfile-only: libcrux-aesgcm
    "RUSTSEC-2026-0212", # unreachable X-Wing support path in active libcrux-secrets
]
