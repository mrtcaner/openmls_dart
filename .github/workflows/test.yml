# Run tests on multiple platforms
#
# Triggers:
# - Manual dispatch (workflow_dispatch)
# - Push to main branch (relevant files)
# - Pull requests (relevant files) - skipped for bot PRs (e.g., automated updates)
# - After successful build-openmls workflow
#
# Platforms: Linux x86_64, Linux ARM64, macOS ARM64, Windows x86_64

name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'rust/**'
      - 'assets/**'
      - 'scripts/**'
      - 'Makefile'
      - 'pubspec.yaml'
      - '.github/workflows/test.yml'
      - '.github/workflows/test-reusable.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'rust/**'
      - 'assets/**'
      - 'scripts/**'
      - 'Makefile'
      - 'pubspec.yaml'
      - '.github/workflows/test.yml'
      - '.github/workflows/test-reusable.yml'
  workflow_run:
    workflows: ["Build openmls FRB Libraries"]
    types:
      - completed

# Least-privilege default. The reusable test workflow declares its own
# contents: read. If badge publication is enabled later, it authenticates with
# a dedicated GIST_TOKEN rather than GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  test:
    # Skip tests for:
    # - Failed workflow_run triggers
    # - Bot PRs (automated updates) - native libraries not yet built
    if: |
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    uses: ./.github/workflows/test-reusable.yml
    with:
      run-coverage: true
      # Publish only after a successful main-branch run. Pull requests calculate
      # coverage but cannot write to the public badge Gist.
      update-badge: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
