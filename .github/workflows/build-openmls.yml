# Build openmls FRB native libraries for all platforms
#
# This workflow builds Rust code using cargo and creates GitHub Releases
# with pre-built native libraries for all supported platforms.
#
# Platforms:
# - Linux x86_64, arm64 (dynamic .so)
# - macOS arm64, x86_64 (dynamic .dylib)
# - iOS device arm64, simulator arm64/x86_64 (dynamic .dylib)
# - Android arm64-v8a, armeabi-v7a, x86_64 (dynamic .so)
# - Windows x86_64 (dynamic .dll)
# - Web (WASM)
#
# Trigger:
# - Push of a `openmls_frb-<version>` tag (created by `make release-frb`) -
#   this is the normal path: a openmls dependency update merges
#   to main WITHOUT bumping the crate, then a deliberate release bumps
#   rust/Cargo.toml and pushes the matching tag, which builds and publishes the
#   native binaries.
# - Manual dispatch (workflow_dispatch) - a retry path for a build that failed
#   AFTER its tag was already pushed. It reads the crate version from
#   rust/Cargo.toml on the DISPATCHED ref (whatever ref you dispatch on, not
#   necessarily the default branch). Note: dispatch cannot bootstrap a brand-new
#   release — `check-release` skips the whole run once the release for that crate
#   version exists, and the `protect-release-tags` ruleset blocks this workflow
#   from creating the tag itself. To (re)build a version, push the signed tag via
#   `make release-frb`; to rebuild an already-released version, delete its
#   GitHub Release and tag first.
#
# The tag name must equal `openmls_frb-<crate version in rust/Cargo.toml>`
# (validated below). The GitHub Release is created on that same tag, so the tag
# you push IS the release tag (no duplicate tags).
#
# After a successful build, creates the GitHub Release with native library
# archives (fail-loud: it never deletes/overwrites an existing release).

name: Build openmls FRB Libraries

on:
  workflow_dispatch:
  push:
    tags:
      - 'openmls_frb-*'

# Least privilege by default; only create-release opts up to contents: write.
permissions:
  contents: read

concurrency:
  group: build-openmls_frb-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Check if release already exists (uses scripts/check_exists_frb_release.dart)
  # ============================================
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      openmls_version: ${{ steps.check.outputs.openmls_version }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup FVM and Flutter
        uses: ./.github/actions/setup-fvm

      - name: Check if release exists
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make check-exists-openmls-frb-release ARGS="--ci"

      # On a tag push, the tag must equal `openmls_frb-<crate version>`. This
      # guards against tagging a commit whose rust/Cargo.toml wasn't bumped to
      # match (mirrors publish.yml's tag/pubspec validation).
      - name: Validate tag matches crate version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#openmls_frb-}"
          CRATE_VERSION="${{ steps.check.outputs.version }}"
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' (version '$TAG_VERSION') does not match rust/Cargo.toml crate version '$CRATE_VERSION'. Bump rust/Cargo.toml and tag 'openmls_frb-$CRATE_VERSION', or use 'make release-frb'."
            exit 1
          fi
          echo "Tag matches crate version: $CRATE_VERSION"

  # ============================================
  # Linux (x86_64 + arm64 on separate runners)
  # ============================================
  build-linux:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build for Linux ${{ matrix.arch }}
        run: |
          cd rust
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-linux-${{ matrix.arch }}
          path: rust/target/${{ matrix.rust_target }}/release/libopenmls_frb.so

  # ============================================
  # macOS (arm64 + x86_64 on separate runners)
  # ============================================
  build-macos:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build for macOS ${{ matrix.arch }}
        env:
          # Make the shipped dylib's minimum macOS version explicit instead of
          # relying on rustc's per-target default (10.12 for x86_64). rustc
          # clamps arm64 to 11.0 (first Apple-silicon macOS) automatically.
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        run: |
          cd rust
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-macos-${{ matrix.arch }}
          path: rust/target/${{ matrix.rust_target }}/release/libopenmls_frb.dylib

  # ============================================
  # iOS (dynamic .dylib)
  # ============================================
  build-ios:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    strategy:
      matrix:
        include:
          - target: device
            arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-ios
          - target: simulator
            arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-ios-sim
          - target: simulator
            arch: x86_64
            runner: macos-latest
            rust_target: x86_64-apple-ios
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build for iOS ${{ matrix.target }} ${{ matrix.arch }}
        env:
          # Rust's default deployment target for aarch64-apple-ios is 10.0,
          # but vendored C code compiled with newer Xcode may generate calls
          # unavailable at that target (e.g. ___chkstk_darwin).
          IPHONEOS_DEPLOYMENT_TARGET: '13.0'
        run: |
          cd rust
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-ios-${{ matrix.target }}-${{ matrix.arch }}
          path: rust/target/${{ matrix.rust_target }}/release/libopenmls_frb.dylib

  # ============================================
  # Android (all architectures)
  # ============================================
  build-android:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            rust_target: aarch64-linux-android
          - abi: armeabi-v7a
            rust_target: armv7-linux-androideabi
          - abi: x86_64
            rust_target: x86_64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Android NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Setup cargo-ndk
        run: cargo install cargo-ndk

      - name: Build for Android ${{ matrix.abi }}
        run: |
          # --platform pins the Android API level the .so links against
          # (matches the package's documented minSdk; cargo-ndk would
          # otherwise use its own default).
          cd rust
          cargo ndk -t ${{ matrix.rust_target }} --platform 24 build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-android-${{ matrix.abi }}
          path: rust/target/${{ matrix.rust_target }}/release/libopenmls_frb.so

  # ============================================
  # Windows x86_64
  # ============================================
  build-windows:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Build for Windows
        shell: pwsh
        run: |
          # Temporarily rename Git's link.exe to prevent it from shadowing MSVC's link.exe
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          $gitLinkBak = "$gitLink.bak"
          if (Test-Path $gitLink) {
            Rename-Item $gitLink $gitLinkBak
          }
          try {
            cargo build --release `
              --manifest-path rust/Cargo.toml `
              --target x86_64-pc-windows-msvc
          } finally {
            if (Test-Path $gitLinkBak) {
              Rename-Item $gitLinkBak $gitLink
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-windows-x86_64
          path: rust/target/x86_64-pc-windows-msvc/release/openmls_frb.dll

  # ============================================
  # WebAssembly (wasm32)
  # ============================================
  build-wasm:
    needs: check-release
    if: needs.check-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build for WASM
        run: make build-web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmls-wasm32
          path: |
            rust/target/wasm32/openmls_frb.js
            rust/target/wasm32/openmls_frb_bg.wasm

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    needs:
      - check-release
      - build-linux
      - build-macos
      - build-ios
      - build-android
      - build-windows
      - build-wasm
    if: needs.check-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Supply-chain gate: publishing the consumer-downloaded native binaries
    # requires a human to approve the `native-build` environment deployment.
    # This mirrors publish.yml's `pub.dev` environment and is the ONLY control
    # that also covers the workflow_dispatch trigger — a tag ruleset cannot gate
    # a dispatch-triggered run. Configure required reviewers at
    # Settings → Environments → native-build; until then the gate is inactive
    # (the environment auto-creates with no protection and does not block).
    # See .github/rulesets/README.md.
    environment: native-build
    env:
      VERSION: ${{ needs.check-release.outputs.version }}
      NATIVE_VERSION: ${{ needs.check-release.outputs.openmls_version }}
    permissions:
      contents: write
      id-token: write       # Sigstore OIDC identity for build provenance
      attestations: write   # store the attestation in the repo
    steps:
      - uses: actions/checkout@v4

      - name: Setup FVM and Flutter
        uses: ./.github/actions/setup-fvm

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          VERSION=${{ env.VERSION }}
          mkdir -p release-archives

          make third-party-notices ARGS="--output release-archives/THIRD_PARTY_NOTICES.txt"
          find artifacts -mindepth 1 -maxdepth 1 -type d \
            -exec cp release-archives/THIRD_PARTY_NOTICES.txt {} \;
          find artifacts -mindepth 1 -maxdepth 1 -type d \
            -exec cp LICENSE {} \;

          # Linux x86_64
          tar -czvf release-archives/openmls_frb-${VERSION}-linux-x86_64.tar.gz \
            -C artifacts/openmls-linux-x86_64 libopenmls_frb.so LICENSE THIRD_PARTY_NOTICES.txt

          # Linux arm64
          tar -czvf release-archives/openmls_frb-${VERSION}-linux-arm64.tar.gz \
            -C artifacts/openmls-linux-arm64 libopenmls_frb.so LICENSE THIRD_PARTY_NOTICES.txt

          # macOS arm64
          tar -czvf release-archives/openmls_frb-${VERSION}-macos-arm64.tar.gz \
            -C artifacts/openmls-macos-arm64 libopenmls_frb.dylib LICENSE THIRD_PARTY_NOTICES.txt

          # macOS x86_64
          tar -czvf release-archives/openmls_frb-${VERSION}-macos-x86_64.tar.gz \
            -C artifacts/openmls-macos-x86_64 libopenmls_frb.dylib LICENSE THIRD_PARTY_NOTICES.txt

          # Windows x86_64
          tar -czvf release-archives/openmls_frb-${VERSION}-windows-x86_64.tar.gz \
            -C artifacts/openmls-windows-x86_64 openmls_frb.dll LICENSE THIRD_PARTY_NOTICES.txt

          # Android ABIs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            tar -czvf release-archives/openmls_frb-${VERSION}-android-${abi}.tar.gz \
              -C artifacts/openmls-android-${abi} libopenmls_frb.so LICENSE THIRD_PARTY_NOTICES.txt
          done

          # iOS device arm64
          tar -czvf release-archives/openmls_frb-${VERSION}-ios-device-arm64.tar.gz \
            -C artifacts/openmls-ios-device-arm64 libopenmls_frb.dylib LICENSE THIRD_PARTY_NOTICES.txt

          # iOS simulator arm64
          tar -czvf release-archives/openmls_frb-${VERSION}-ios-simulator-arm64.tar.gz \
            -C artifacts/openmls-ios-simulator-arm64 libopenmls_frb.dylib LICENSE THIRD_PARTY_NOTICES.txt

          # iOS simulator x86_64
          tar -czvf release-archives/openmls_frb-${VERSION}-ios-simulator-x86_64.tar.gz \
            -C artifacts/openmls-ios-simulator-x86_64 libopenmls_frb.dylib LICENSE THIRD_PARTY_NOTICES.txt

          # WebAssembly
          tar -czvf release-archives/openmls_frb-${VERSION}-wasm32.tar.gz \
            -C artifacts/openmls-wasm32 openmls_frb.js openmls_frb_bg.wasm LICENSE THIRD_PARTY_NOTICES.txt

          # Generate SHA256 checksums
          cd release-archives
          sha256sum openmls_frb-${VERSION}-*.tar.gz > openmls_frb-${VERSION}-checksums.sha256
          cd ..

          ls -lh release-archives/

      # Sigstore build-provenance attestation (SLSA Build L2) for every release
      # archive. subject-checksums reuses the just-generated SHA256 file, so the
      # attested digests are exactly the ones the build hook verifies. The
      # resulting bundle is attached to the release below so consumers can
      # verify fully offline (see SECURITY.md → Authenticity).
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: release-archives/openmls_frb-${{ env.VERSION }}-checksums.sha256

      - name: Attach attestation bundle to release assets
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          cp "$BUNDLE_PATH" "release-archives/openmls_frb-${VERSION}.sigstore.jsonl"
          ls -lh "release-archives/openmls_frb-${VERSION}.sigstore.jsonl"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ env.VERSION }}
          TAG="openmls_frb-${VERSION}"
          TITLE="openmls_frb ${VERSION} - Native Libraries"

          # No delete-then-recreate: check-release skips the whole run when the
          # release for this crate version already exists, and if a dispatch/tag
          # race slips past that check the slower `gh release create` fails
          # loudly instead of silently clobbering already-published binaries
          # that consumers' build hooks download. To intentionally rebuild the
          # same version, delete the release and its tag manually first.

          # Create release with all assets
          gh release create "$TAG" \
            --title "$TITLE" \
            --latest \
            --notes "$(cat <<EOF
          ## openmls_frb ${VERSION} Native Libraries

          Pre-built Flutter Rust Bridge native libraries for all supported platforms.
          **These archives are downloaded automatically by \`hook/build.dart\` during Dart/Flutter builds.**
          **Based on [openmls ${NATIVE_VERSION}](https://github.com/openmls/openmls/releases/tag/${NATIVE_VERSION})**

          ### Platforms

          | Platform | Architecture | Archive |
          |----------|--------------|---------|
          | Linux | x86_64 | \`openmls_frb-${VERSION}-linux-x86_64.tar.gz\` |
          | Linux | arm64 | \`openmls_frb-${VERSION}-linux-arm64.tar.gz\` |
          | macOS | arm64 | \`openmls_frb-${VERSION}-macos-arm64.tar.gz\` |
          | macOS | x86_64 | \`openmls_frb-${VERSION}-macos-x86_64.tar.gz\` |
          | Windows | x86_64 | \`openmls_frb-${VERSION}-windows-x86_64.tar.gz\` |
          | Android | arm64-v8a | \`openmls_frb-${VERSION}-android-arm64-v8a.tar.gz\` |
          | Android | armeabi-v7a | \`openmls_frb-${VERSION}-android-armeabi-v7a.tar.gz\` |
          | Android | x86_64 | \`openmls_frb-${VERSION}-android-x86_64.tar.gz\` |
          | iOS | device (arm64) | \`openmls_frb-${VERSION}-ios-device-arm64.tar.gz\` |
          | iOS | simulator (arm64) | \`openmls_frb-${VERSION}-ios-simulator-arm64.tar.gz\` |
          | iOS | simulator (x86_64) | \`openmls_frb-${VERSION}-ios-simulator-x86_64.tar.gz\` |
          | Web | wasm32 | \`openmls_frb-${VERSION}-wasm32.tar.gz\` |

          ### Checksums
          SHA256 checksums are available in \`openmls_frb-${VERSION}-checksums.sha256\`

          Every platform archive includes this fork's \`LICENSE\` and a
          \`THIRD_PARTY_NOTICES.txt\` generated deterministically from the
          locked Cargo dependency resolution.

          ### Build Provenance
          Every archive is attested with [GitHub Artifact Attestations](https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations) (Sigstore). Verify:
          \`\`\`bash
          gh attestation verify openmls_frb-${VERSION}-<platform>.tar.gz --repo ${GITHUB_REPOSITORY}
          \`\`\`
          Offline verification: use the attached \`openmls_frb-${VERSION}.sigstore.jsonl\` bundle with \`--bundle\` (see SECURITY.md).
          EOF
          )" \
            release-archives/openmls_frb-${VERSION}-linux-x86_64.tar.gz \
            release-archives/openmls_frb-${VERSION}-linux-arm64.tar.gz \
            release-archives/openmls_frb-${VERSION}-macos-arm64.tar.gz \
            release-archives/openmls_frb-${VERSION}-macos-x86_64.tar.gz \
            release-archives/openmls_frb-${VERSION}-windows-x86_64.tar.gz \
            release-archives/openmls_frb-${VERSION}-android-arm64-v8a.tar.gz \
            release-archives/openmls_frb-${VERSION}-android-armeabi-v7a.tar.gz \
            release-archives/openmls_frb-${VERSION}-android-x86_64.tar.gz \
            release-archives/openmls_frb-${VERSION}-ios-device-arm64.tar.gz \
            release-archives/openmls_frb-${VERSION}-ios-simulator-arm64.tar.gz \
            release-archives/openmls_frb-${VERSION}-ios-simulator-x86_64.tar.gz \
            release-archives/openmls_frb-${VERSION}-wasm32.tar.gz \
            release-archives/openmls_frb-${VERSION}-checksums.sha256 \
            release-archives/openmls_frb-${VERSION}.sigstore.jsonl
